<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started — Koko</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f6f8ff; color:#1f2554; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
        .card { background:#fff; border-radius:12px; padding:28px; box-shadow:0 14px 36px rgba(67,56,202,0.06); width:min(720px,92vw); text-align:left; }
        h1{margin:0 0 12px;font-size:1.6rem}
        p{color:#4d578f;margin:0 0 18px}
        .row{display:flex;gap:10px}
        .btn{border:0;padding:10px 16px;border-radius:10px;cursor:pointer;font-weight:700}
        .btn-primary{background:#6366f1;color:#fff}
        .btn-secondary{background:#eef1ff;color:#4338ca;border:1px solid #dfe5ff}
        a.btn {display:inline-block;text-decoration:none;text-align:center}
    </style>
</head>
<body>
    <div class="card">
        <h1>Welcome — Start with Koko</h1>
        <p>You're one step away from trying Koko. Upload your meeting audio and Koko will transcribe it, summarize the key points, extract action items, and draft your follow-up email — automatically.</p>
        <div class="row">
            <a href="koko.html" class="btn btn-secondary">Back</a>
            <a href="koko-app.html" class="btn btn-primary">Begin</a>
        </div>
    </div>

</html>
