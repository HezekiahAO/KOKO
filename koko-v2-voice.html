<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koko — Voice</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#6366f1;--pd:#4338ca;--ps:#e8eaff;
  --t1:#1f2554;--t2:#4d578f;--tm:#8b93c4;
  --bg:#0f1030;--bg2:#161840;--s:#1c1f52;--b:rgba(99,102,241,.2);
}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:#e8eaff}

/* ORB / mic button */
.stage{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;position:relative;overflow:hidden}

/* Ambient background glow */
.stage::before{content:"";position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,.12) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-55%);pointer-events:none}

.koko-name{font-size:.85rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--tm);margin-bottom:2.5rem}

.orb-wrap{position:relative;width:160px;height:160px;display:flex;align-items:center;justify-content:center;margin-bottom:2rem;cursor:pointer}

.ring{position:absolute;border-radius:50%;border:1.5px solid rgba(99,102,241,.25);animation:ring-pulse 2.5s ease-out infinite}
.ring:nth-child(1){width:160px;height:160px}
.ring:nth-child(2){width:200px;height:200px;animation-delay:.5s}
.ring:nth-child(3){width:240px;height:240px;animation-delay:1s}

@keyframes ring-pulse{
  0%{opacity:.6;transform:scale(.9)}
  100%{opacity:0;transform:scale(1.15)}
}

.orb{width:110px;height:110px;border-radius:50%;background:linear-gradient(135deg,var(--p) 0%,var(--pd) 100%);display:flex;align-items:center;justify-content:center;box-shadow:0 0 60px rgba(99,102,241,.5),0 20px 40px rgba(0,0,0,.4);transition:transform .2s,box-shadow .2s;position:relative;z-index:1}
.orb:hover{transform:scale(1.05);box-shadow:0 0 80px rgba(99,102,241,.65),0 20px 40px rgba(0,0,0,.4)}
.orb.listening{animation:orb-breathe 1.2s ease-in-out infinite;box-shadow:0 0 80px rgba(99,102,241,.7),0 0 120px rgba(99,102,241,.35),0 20px 40px rgba(0,0,0,.4)}
@keyframes orb-breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

.mic-icon{color:#fff;opacity:.9}

/* Waveform bars (shown while listening) */
.waveform{display:flex;align-items:center;gap:3px;height:36px;opacity:0;transition:opacity .3s}
.waveform.visible{opacity:1}
.wb{width:4px;border-radius:3px;background:var(--p);animation:wb 1s ease-in-out infinite alternate}
.wb:nth-child(1){--h:10px;animation-duration:.7s}
.wb:nth-child(2){--h:22px;animation-duration:.9s;animation-delay:.1s}
.wb:nth-child(3){--h:30px;animation-duration:.6s;animation-delay:.2s}
.wb:nth-child(4){--h:18px;animation-duration:1.1s;animation-delay:.05s}
.wb:nth-child(5){--h:34px;animation-duration:.8s;animation-delay:.15s}
.wb:nth-child(6){--h:24px;animation-duration:.75s;animation-delay:.25s}
.wb:nth-child(7){--h:14px;animation-duration:.95s;animation-delay:.1s}
@keyframes wb{from{height:calc(var(--h)*.3)}to{height:var(--h)}}

.status-text{font-size:1rem;font-weight:600;color:#a5b4fc;margin-top:1.5rem;min-height:1.4rem;text-align:center}
.transcript-preview{max-width:420px;text-align:center;font-size:.9rem;color:var(--tm);line-height:1.6;margin-top:.75rem;min-height:2.8rem;transition:opacity .3s;padding:0 1rem}

/* Response bubble */
.response-area{max-width:480px;width:90%;margin-top:1.5rem}
.response-bubble{background:var(--s);border:1px solid var(--b);border-radius:1rem;padding:1rem 1.2rem;font-size:.92rem;line-height:1.6;color:#c7d2fe;display:none;animation:fade-up .35s ease}
@keyframes fade-up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Bottom tray */
.tray{position:fixed;bottom:0;left:0;right:0;background:rgba(15,16,48,.9);backdrop-filter:blur(12px);border-top:1px solid var(--b);padding:.75rem 1.25rem;display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap}
.tray-btn{padding:.42rem .85rem;border-radius:999px;border:1px solid var(--b);background:transparent;color:#a5b4fc;font-size:.8rem;font-weight:600;cursor:pointer;transition:background .15s,color .15s;font-family:inherit}
.tray-btn:hover{background:rgba(99,102,241,.2);color:#e8eaff}

/* Output drawer */
.drawer{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--b);border-radius:1.2rem 1.2rem 0 0;padding:1.25rem 1.5rem 2rem;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);max-height:70vh;overflow-y:auto;z-index:10}
.drawer.open{transform:translateY(0)}
.drawer-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.15);margin:0 auto .9rem}
.drawer h3{font-size:.95rem;font-weight:700;color:#c7d2fe;margin-bottom:.75rem}
.drawer-body{font-size:.88rem;color:#a5b4fc;line-height:1.75;white-space:pre-wrap}
.close-drawer{position:absolute;top:.9rem;right:1.25rem;background:none;border:none;color:var(--tm);cursor:pointer;font-size:1rem}

.spinner{width:22px;height:22px;border:2.5px solid rgba(99,102,241,.3);border-top-color:var(--p);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="stage">
  <p class="koko-name">● Koko</p>

  <div class="orb-wrap" id="orb-wrap" onclick="toggleListen()">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="orb" id="orb">
      <svg class="mic-icon" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="12" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/>
      </svg>
    </div>
  </div>

  <div class="waveform" id="waveform">
    <div class="wb"></div><div class="wb"></div><div class="wb"></div>
    <div class="wb"></div><div class="wb"></div><div class="wb"></div><div class="wb"></div>
  </div>

  <p class="status-text" id="status">Tap to speak</p>
  <p class="transcript-preview" id="transcript"></p>

  <div class="response-area">
    <div class="response-bubble" id="response"></div>
  </div>
</div>

<!-- Quick commands tray -->
<div class="tray">
  <button class="tray-btn" onclick="askKoko('Summarise my last meeting')">Summarise meeting</button>
  <button class="tray-btn" onclick="askKoko('What are my action items?')">Action items</button>
  <button class="tray-btn" onclick="askKoko('Draft a follow-up email for the team')">Draft email</button>
  <button class="tray-btn" onclick="askKoko('What decisions were made today?')">Key decisions</button>
</div>

<!-- Output drawer -->
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <button class="close-drawer" onclick="closeDrawer()">✕</button>
  <h3 id="drawer-title">Koko's response</h3>
  <div class="drawer-body" id="drawer-body"></div>
</div>

<script>
const API="https://api.anthropic.com/v1/messages";
const MODEL="claude-sonnet-4-6";
let listening=false;
let recognition=null;
let transcript='';

function toggleListen(){
  if(listening){stopListening()}else{startListening()}
}

function startListening(){
  listening=true;
  document.getElementById('orb').classList.add('listening');
  document.getElementById('waveform').classList.add('visible');
  document.getElementById('status').textContent='Listening…';
  document.getElementById('transcript').textContent='';

  if('webkitSpeechRecognition' in window||'SpeechRecognition' in window){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    recognition=new SR();
    recognition.continuous=false;recognition.interimResults=true;recognition.lang='en-US';
    recognition.onresult=e=>{
      transcript=Array.from(e.results).map(r=>r[0].transcript).join('');
      document.getElementById('transcript').textContent=transcript;
    };
    recognition.onend=()=>{if(transcript)processVoice(transcript);else stopListening();};
    recognition.start();
  } else {
    // Simulate if no speech API
    setTimeout(()=>{
      transcript="Summarise my last meeting and list action items";
      document.getElementById('transcript').textContent=transcript;
      stopListening();
    },2500);
  }
}

function stopListening(){
  listening=false;
  if(recognition){recognition.stop();recognition=null;}
  document.getElementById('orb').classList.remove('listening');
  document.getElementById('waveform').classList.remove('visible');
  document.getElementById('status').textContent='Tap to speak';
}

async function processVoice(text){
  document.getElementById('status').textContent='Processing…';
  const rb=document.getElementById('response');
  rb.innerHTML='<div class="spinner"></div>';rb.style.display='flex';rb.style.justifyContent='center';

  try{
    const res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:MODEL,max_tokens:1000,
        system:'You are Koko, an AI workplace assistant. The user is speaking to you. Give a concise, conversational spoken response (2-4 sentences max unless drafting an email). Be warm and direct.',
        messages:[{role:'user',content:text}]})});
    const data=await res.json();
    const reply=data.content?.[0]?.text||'Sorry, I had trouble.';
    rb.style.display='block';rb.textContent=reply;
    speak(reply);
    document.getElementById('status').textContent='Done';
    // If response is long, also show in drawer
    if(reply.length>200){openDrawer('Koko said',reply);}
  }catch(e){rb.style.display='block';rb.textContent='Something went wrong. Please try again.';}
  document.getElementById('transcript').textContent='';
  setTimeout(()=>document.getElementById('status').textContent='Tap to speak',3000);
}

async function askKoko(text){
  document.getElementById('transcript').textContent=text;
  await processVoice(text);
}

function speak(text){
  if('speechSynthesis' in window){
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text.substring(0,300));
    u.rate=1.05;u.pitch=1;
    const voices=window.speechSynthesis.getVoices();
    const preferred=voices.find(v=>v.name.includes('Samantha')||v.name.includes('Google UK English Female')||v.name.includes('Karen'));
    if(preferred)u.voice=preferred;
    window.speechSynthesis.speak(u);
  }
}

function openDrawer(title,body){
  document.getElementById('drawer-title').textContent=title;
  document.getElementById('drawer-body').textContent=body;
  document.getElementById('drawer').classList.add('open');
}

function closeDrawer(){document.getElementById('drawer').classList.remove('open');}
</script>
</body>
</html>
